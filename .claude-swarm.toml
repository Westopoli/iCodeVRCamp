# claude-swarm config for iCode camp project
# D5 Rally Camp build uses this cascade.

spec_dir          = "."
briefs_dir        = ".swarm/briefs/"
type_contract_path = "_balance/Day5/contract.py"

umbrella_test_cmd = "python -m pytest _balance/Day5/test_sim.py -x --tb=short"
graphify_cmd      = ""

parent_owned = [
  "_balance/Day5/contract.py",
  "_balance/Day5/test_sim.py",
  ".swarm/**",
  "BIBLE.md",
  "CLAUDE.md",
]

[invariants]
max_impl_lines      = 250
max_test_assertions = 25

ambiguous_verbs = [
  "decide", "choose", "design", "determine",
  "figure out", "resolve", "as appropriate",
  "use your judgment", "pick", "select an approach",
]

[gates]
extra_spec_gate_cmds = []
